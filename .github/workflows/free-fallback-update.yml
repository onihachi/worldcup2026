name: Free fallback data update

on:
  schedule:
    # JST 08:20, after the 07:00-08:00 Mac-first update window.
    - cron: '20 23 * * *'
    # JST 13:10, after the 12:00 Mac-first highlight check.
    - cron: '10 4 * * *'
    # JST 19:10, after the 18:00 Mac-first catch-up check.
    - cron: '10 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: free-fallback-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Pull latest main
        run: git pull --ff-only origin main

      - name: Apply free public data
        run: node scripts/update-free-data.mjs --skip-link-check

      - name: Validate static page
        run: node scripts/validate-page.mjs

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto update World Cup results"
          git push origin main
